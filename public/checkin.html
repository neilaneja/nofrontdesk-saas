<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Guest Check-In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1B1F26;
    --ivory: #FAF6EE;
    --brass: #8C7355;
    --ink-90: rgba(27,31,38,0.9);
    --ink-70: rgba(27,31,38,0.7);
    --ink-55: rgba(27,31,38,0.55);
    --ink-45: rgba(27,31,38,0.45);
    --ink-40: rgba(27,31,38,0.4);
    --ink-30: rgba(27,31,38,0.3);
    --ink-20: rgba(27,31,38,0.2);
    --ink-12: rgba(27,31,38,0.12);
    --ink-08: rgba(27,31,38,0.08);
    --ink-06: rgba(27,31,38,0.06);
    --display: 'Cormorant Garamond', 'Times New Roman', serif;
    --body: 'Inter', -apple-system, system-ui, sans-serif;
  }

  html, body {
    width: 100%; min-height: 100vh;
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: var(--ivory);
    color: var(--ink);
  }

  /* Grain overlay */
  body::after {
    content: '';
    position: fixed; inset: 0; pointer-events: none;
    opacity: 0.035; mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.6'/></svg>");
    z-index: 9999;
  }

  .container {
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 32px;
  }

  /* ── Monogram ── */
  .monogram {
    width: 64px; height: 64px; border-radius: 50%;
    border: 1px solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--display);
    font-size: 27px; font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--ink);
    margin: 0 auto;
  }
  .monogram.has-logo {
    border: none; overflow: hidden;
    padding: 0;
  }
  .monogram.has-logo img {
    width: 100%; height: 100%; object-fit: cover;
  }

  /* ── Welcome section ── */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px 0 48px;
  }

  .welcome-label {
    margin-top: 36px;
    font-family: var(--body);
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(27,31,38,0.5);
  }

  .welcome h1 {
    margin-top: 14px;
    font-family: var(--display);
    font-weight: 500;
    font-size: 42px;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--ink);
    text-wrap: balance;
  }

  .accent-rule {
    margin-top: 22px;
    width: 32px; height: 1px;
    background: var(--brass);
    opacity: 0.6;
  }

  .welcome p {
    margin-top: 22px;
    max-width: 280px;
    font-family: var(--body);
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink-55);
    text-wrap: pretty;
  }

  /* ── Search section ── */
  .search-section {
    margin-top: 36px;
  }

  .search-section h2 {
    font-family: var(--display);
    font-weight: 500;
    font-size: 34px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  .search-section .subtitle {
    margin-top: 12px;
    font-family: var(--body);
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink-55);
  }

  /* ── Form fields (underline style) ── */
  .field-group {
    margin-top: 36px;
  }

  .field-label {
    display: block;
    font-family: var(--body);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-45);
    margin-bottom: 8px;
    transition: color 200ms;
  }

  .field-label.focused {
    color: var(--brass);
  }

  .field-input {
    width: 100%;
    height: 56px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--ink-20);
    padding: 0 0 12px;
    outline: none;
    font-family: var(--body);
    font-size: 18px;
    color: var(--ink);
    letter-spacing: -0.01em;
    transition: border-color 200ms;
  }

  .field-input:focus {
    border-bottom-color: var(--brass);
    border-bottom-width: 1.5px;
  }

  .field-input::placeholder {
    color: var(--ink-30);
  }

  /* ── Pill buttons ── */
  .btn-primary {
    width: 100%;
    height: 56px;
    border-radius: 100px;
    border: none;
    background: var(--ink);
    color: var(--ivory);
    font-family: var(--body);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 6px 20px rgba(27,31,38,0.12);
    transition: all 200ms;
  }

  .btn-primary:disabled {
    background: var(--ink-12);
    color: var(--ink-40);
    cursor: not-allowed;
    box-shadow: none;
  }

  .btn-primary:not(:disabled):hover {
    box-shadow: 0 8px 28px rgba(27,31,38,0.18);
    transform: translateY(-1px);
  }

  .btn-primary .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(250,246,238,0.3);
    border-top-color: var(--ivory);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Help link ── */
  .help-link {
    margin-top: 16px;
    text-align: center;
    font-family: var(--body);
    font-size: 12px;
    color: var(--ink-45);
    padding-bottom: 32px;
  }

  .help-link a {
    color: var(--brass);
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ── Error message ── */
  .error-msg {
    margin-top: 16px;
    padding: 14px 20px;
    background: #FFF5F5;
    border: 1px solid rgba(200,50,50,0.15);
    border-radius: 14px;
    font-family: var(--body);
    font-size: 13px;
    color: #9B2C2C;
    text-align: center;
    line-height: 1.5;
  }

  /* ── Results cards ── */
  .results-section {
    margin-top: 28px;
  }

  .results-section h2 {
    font-family: var(--display);
    font-weight: 500;
    font-size: 34px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  .results-section .subtitle {
    margin-top: 12px;
    font-family: var(--body);
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink-55);
  }

  .result-cards {
    margin-top: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 32px;
  }

  .result-card {
    padding: 18px 20px;
    background: #fff;
    border: 1px solid var(--ink-08);
    border-radius: 18px;
    cursor: pointer;
    transition: all 200ms;
    box-shadow: 0 1px 2px rgba(27,31,38,0.04);
    text-decoration: none;
    display: block;
    color: inherit;
  }

  .result-card:hover {
    border-color: var(--brass);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(27,31,38,0.08);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .card-name {
    font-family: var(--display);
    font-weight: 500;
    font-size: 21px;
    line-height: 1.15;
    color: var(--ink);
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    flex: 1;
  }

  .card-conf {
    font-family: var(--body);
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--ink-40);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-unit {
    margin-top: 8px;
    font-family: var(--body);
    font-size: 14px;
    color: var(--ink-70);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta {
    margin-top: 6px;
    font-family: var(--body);
    font-size: 12px;
    color: var(--ink-45);
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta .sep {
    margin: 0 8px;
    opacity: 0.5;
  }

  /* ── No results ── */
  .no-results {
    padding: 32px 24px;
    text-align: center;
    background: #fff;
    border-radius: 18px;
    border: 1px dashed var(--ink-20);
  }

  .no-results p {
    font-family: var(--body);
    font-size: 13px;
    color: var(--ink-55);
    line-height: 1.6;
  }

  /* ── Step indicator ── */
  .step-label {
    text-align: right;
    font-family: var(--body);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-40);
    white-space: nowrap;
    padding: 16px 0 0;
  }

  /* ── Back button ── */
  .back-btn {
    background: transparent;
    border: none;
    padding: 0;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--body);
    font-size: 13px;
    letter-spacing: 0.02em;
    color: var(--ink-55);
    margin-top: 16px;
  }

  .back-btn:hover { color: var(--ink); }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 24px 0;
    font-family: var(--body);
    font-size: 11px;
    color: var(--ink-30);
    letter-spacing: 0.04em;
  }

  .footer a { color: var(--ink-40); text-decoration: none; }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .container { padding: 0 24px; }
    .welcome h1 { font-size: 38px; }
    .search-section h2, .results-section h2 { font-size: 30px; }
  }

  /* ── Hidden utility ── */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="container">

  <!-- ═══ WELCOME SCREEN ═══ -->
  <div id="welcomeScreen" class="welcome">
    <div class="monogram" id="monogram"></div>
    <div class="welcome-label">Welcome to</div>
    <h1 id="propertyName">Loading...</h1>
    <div class="accent-rule"></div>
    <p id="welcomeMsg">Skip the front desk. Locate your reservation and check in from this screen.</p>
  </div>

  <!-- ═══ SEARCH FORM ═══ -->
  <div id="searchForm">
    <button class="btn-primary" id="beginBtn" style="margin-top: 0;">
      Begin check-in
      <svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <!-- ═══ SEARCH SCREEN (initially hidden) ═══ -->
  <div id="searchScreen" class="hidden">
    <button class="back-btn" id="backToWelcome">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back
    </button>

    <div class="step-label">Step 1 of 2</div>

    <div class="search-section">
      <h2>Find your<br>reservation</h2>
      <p class="subtitle">Enter the last name on your booking to get started.</p>

      <div class="field-group">
        <label class="field-label" id="nameLabel" for="lastName">Last name</label>
        <input
          class="field-input"
          type="text"
          id="lastName"
          placeholder="e.g. Smith"
          autocomplete="off"
          autofocus
        >
      </div>

      <div id="searchError" class="error-msg hidden"></div>

      <div style="margin-top: 36px;">
        <button class="btn-primary" id="searchBtn" disabled>
          <span id="searchBtnText">Continue</span>
          <div class="spinner hidden" id="searchSpinner"></div>
        </button>
      </div>
    </div>
  </div>

  <!-- ═══ RESULTS SCREEN (initially hidden) ═══ -->
  <div id="resultsScreen" class="hidden">
    <button class="back-btn" id="backToSearch">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back
    </button>

    <div class="step-label">Step 2 of 2</div>

    <div class="results-section">
      <h2 id="resultsTitle">Select your stay</h2>
      <p class="subtitle" id="resultsSubtitle"></p>
      <div class="result-cards" id="resultCards"></div>
    </div>
  </div>

  <!-- ═══ HELP + FOOTER ═══ -->
  <div style="flex: 1;"></div>
  <div class="help-link" id="helpSection">
    Need help? <a href="tel:1-855-919-7368">Call 1-855-919-7368</a>
  </div>
  <div class="footer">
    Powered by <a href="https://nofrontdesk.com">NoFrontDesk</a>
  </div>
</div>

<script>
(function() {
  // ── State ──
  let accountSlug = '', propertySlug = '', config = {};

  // ── Elements ──
  const $ = id => document.getElementById(id);
  const welcomeScreen = $('welcomeScreen');
  const searchForm = $('searchForm');
  const searchScreen = $('searchScreen');
  const resultsScreen = $('resultsScreen');
  const monogram = $('monogram');
  const propertyName = $('propertyName');
  const welcomeMsg = $('welcomeMsg');
  const nameLabel = $('nameLabel');
  const lastNameInput = $('lastName');
  const searchBtn = $('searchBtn');
  const searchBtnText = $('searchBtnText');
  const searchSpinner = $('searchSpinner');
  const searchError = $('searchError');
  const resultsTitle = $('resultsTitle');
  const resultsSubtitle = $('resultsSubtitle');
  const resultCards = $('resultCards');
  const beginBtn = $('beginBtn');
  const backToWelcome = $('backToWelcome');
  const backToSearch = $('backToSearch');

  // ── Parse URL for slugs ──
  const path = window.location.pathname;
  const parts = path.split('/').filter(Boolean);
  if (parts[0] === 'c' && parts.length >= 3) {
    accountSlug = parts[1];
    propertySlug = parts[2];
  }

  // ── Load property config ──
  async function loadProperty() {
    try {
      const resp = await fetch(`/api/property/${accountSlug}/${propertySlug}`);
      if (!resp.ok) throw new Error('Property not found');
      config = await resp.json();

      // Set property name
      const name = config.name || 'Check-In';
      propertyName.textContent = name;
      document.title = name + ' — Guest Check-In';

      // Set monogram or logo
      if (config.logoUrl) {
        monogram.className = 'monogram has-logo';
        monogram.innerHTML = '<img src="' + config.logoUrl + '" alt="' + name + '">';
      } else {
        const initials = name.split(' ')
          .filter(w => w.length > 0 && w[0] === w[0].toUpperCase())
          .map(w => w[0])
          .slice(0, 3)
          .join('');
        monogram.textContent = initials || name[0];
      }

      // Welcome message
      if (config.welcomeMessage) {
        welcomeMsg.textContent = config.welcomeMessage;
      }

      // Help contact
      if (config.supportPhone) {
        $('helpSection').innerHTML = 'Need help? <a href="tel:' + config.supportPhone + '">Call ' + config.supportPhone + '</a>';
      }

    } catch (err) {
      propertyName.textContent = 'Check-In';
      monogram.textContent = '?';
      console.error('Failed to load property:', err);
    }
  }

  // ── Screen transitions ──
  function showWelcome() {
    welcomeScreen.classList.remove('hidden');
    searchForm.classList.remove('hidden');
    searchScreen.classList.add('hidden');
    resultsScreen.classList.add('hidden');
    searchError.classList.add('hidden');
    lastNameInput.value = '';
    searchBtn.disabled = true;
  }

  function showSearch() {
    welcomeScreen.classList.add('hidden');
    searchForm.classList.add('hidden');
    searchScreen.classList.remove('hidden');
    resultsScreen.classList.add('hidden');
    searchError.classList.add('hidden');
    setTimeout(() => lastNameInput.focus(), 100);
  }

  function showResults(results, query) {
    if (results.length === 0) {
      // Stay on search screen — show error inline so user can immediately retry
      searchError.textContent = 'No reservations found for "' + query + '". Check the spelling or try another name.';
      searchError.classList.remove('hidden');
      lastNameInput.select();
      setTimeout(() => lastNameInput.focus(), 50);
      return;
    }

    searchScreen.classList.add('hidden');
    resultsScreen.classList.remove('hidden');

    if (results.length === 1) {
      resultsTitle.textContent = 'We found you';
      resultsSubtitle.textContent = 'Confirm the details below to continue.';
      renderCards(results);
    } else {
      resultsTitle.textContent = 'Select your stay';
      resultsSubtitle.innerHTML = results.length + ' reservations under "<strong>' + escapeHtml(query) + '</strong>".';
      renderCards(results);
    }
  }

  function renderCards(results) {
    resultCards.innerHTML = '';
    results.forEach(r => {
      const card = document.createElement('div');
      card.className = 'result-card';

      const guestName = (r.guestFirstName || '') + ' ' + (r.guestLastName || r.guestName || '');
      const unit = r.listingName || r.unitName || '';
      const checkIn = formatDate(r.checkIn || r.checkInDate);
      const checkOut = formatDate(r.checkOut || r.checkOutDate);
      const nights = r.nights || calcNights(r.checkIn || r.checkInDate, r.checkOut || r.checkOutDate);
      const guests = r.guestsCount || r.numberOfGuests || '—';
      const conf = r.confirmationCode || r.confirmation || '';

      card.innerHTML = `
        <div class="card-header">
          <div class="card-name">${escapeHtml(guestName.trim())}</div>
          ${conf ? '<div class="card-conf">' + escapeHtml(conf) + '</div>' : ''}
        </div>
        <div class="card-unit">${escapeHtml(unit)}</div>
        <div class="card-meta">
          ${checkIn}${checkOut ? ' – ' + checkOut : ''}
          ${nights ? '<span class="sep">·</span>' + nights + ' nights' : ''}
          ${guests !== '—' ? '<span class="sep">·</span>' + guests + ' guest' + (guests > 1 ? 's' : '') : ''}
        </div>
      `;

      // If there's a check-in URL, link to it
      if (r.checkInFormUrl) {
        card.onclick = () => { window.location.href = r.checkInFormUrl; };
      }

      resultCards.appendChild(card);
    });
  }

  // ── Search ──
  async function doSearch() {
    const lastName = lastNameInput.value.trim();
    if (!lastName) return;

    // Show loading
    searchBtn.disabled = true;
    searchBtnText.textContent = 'Searching...';
    searchSpinner.classList.remove('hidden');
    searchError.classList.add('hidden');

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 45000);

    try {
      const resp = await fetch('/api/lookup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lastName, accountSlug, propertySlug }),
        signal: controller.signal,
      });
      clearTimeout(timeout);

      if (!resp.ok) {
        const data = await resp.json().catch(() => ({}));
        throw new Error(data.error || 'Search failed. Please try again.');
      }

      const data = await resp.json();
      let results = data.results || data.reservations || [];
      // Handle single-object response (e.g. { reservation: {...} })
      if (!results.length && data.reservation) {
        results = [data.reservation];
      }
      showResults(results, lastName);

    } catch (err) {
      clearTimeout(timeout);
      if (err.name === 'AbortError') {
        searchError.textContent = 'Search timed out. Please try again.';
      } else {
        searchError.textContent = err.message || 'Something went wrong. Please try again.';
      }
      searchError.classList.remove('hidden');
    } finally {
      searchBtn.disabled = !lastNameInput.value.trim();
      searchBtnText.textContent = 'Continue';
      searchSpinner.classList.add('hidden');
    }
  }

  // ── Helpers ──
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function formatDate(d) {
    if (!d) return '';
    const date = new Date(d);
    if (isNaN(date)) return d;
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function calcNights(checkIn, checkOut) {
    if (!checkIn || !checkOut) return '';
    const a = new Date(checkIn), b = new Date(checkOut);
    if (isNaN(a) || isNaN(b)) return '';
    return Math.round((b - a) / (1000 * 60 * 60 * 24));
  }

  // ── Event listeners ──
  beginBtn.addEventListener('click', showSearch);
  backToWelcome.addEventListener('click', showWelcome);
  backToSearch.addEventListener('click', () => {
    resultsScreen.classList.add('hidden');
    searchScreen.classList.remove('hidden');
    searchError.classList.add('hidden');
    setTimeout(() => lastNameInput.focus(), 100);
  });

  lastNameInput.addEventListener('input', () => {
    searchBtn.disabled = lastNameInput.value.trim().length < 2;
  });

  lastNameInput.addEventListener('focus', () => {
    nameLabel.classList.add('focused');
  });

  lastNameInput.addEventListener('blur', () => {
    nameLabel.classList.remove('focused');
  });

  lastNameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && lastNameInput.value.trim().length >= 2) {
      doSearch();
    }
  });

  searchBtn.addEventListener('click', doSearch);

  // ── Init ──
  loadProperty();
})();
</script>

</body>
</html>
